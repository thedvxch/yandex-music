name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so rapid pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:examples
      - run: npm test
      # tsdown (build tool) needs Node >= 22.18; the published bundle still runs on Node 20.
      - if: matrix.node == 22
        run: npm run build
